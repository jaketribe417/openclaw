# -----------------------------------------------------------------------------
# Non-functional requirements
# -----------------------------------------------------------------------------

technical:
  wifi: reliable_on_production_floor
  devices: [phones, tablets, computers]
  camera_access_operators: true
  offline_support: not_required
  performance:
    page_load_target: "<3 seconds"
    realtime_transport: SSE
    concurrent_users_target: "50+"
    executive_report_generation_target: "<5 seconds"

success_criteria:
  - operators_report_under_30_seconds
  - escalation_if_unacknowledged_15_minutes
  - full_audit_trail
  - real_time_dashboard_accuracy
  - multi_location_hierarchy_works
  - executive_reports_under_5_seconds_where_applicable

# -----------------------------------------------------------------------------
# Decisions log
# -----------------------------------------------------------------------------

decisions_log:
  - date: "2026-04-01"
    decision: Floor map drag-and-drop required
    rationale: Visual equipment placement
  - date: "2026-04-01"
    decision: Mobile-first operator interface
    rationale: Fast on-floor reporting
  - date: "2026-04-10"
    decision: Hierarchical multi-tenant Company→Building→Floor→Zone
    rationale: Multiple locations and expansion
  - date: "2026-04-10"
    decision: Three-tier status Running/Degraded/Down
    rationale: Partial failures and flexible rollup
  - date: "2026-04-10"
    decision: Equipment→Module→Component hierarchy
    rationale: Admin-owned equipment; tech-owned sub-units
  - date: "2026-04-10"
    decision: First-to-acknowledge with 15-minute escalation
    rationale: Fair distribution and response guarantee
  - date: "2026-04-10"
    decision: Simple parts catalog with cost tracking
    rationale: Repair costs without full inventory
  - date: "2026-04-10"
    decision: Responsive web not PWA
    rationale: Reliable Wi-Fi; simpler implementation
  - date: "2026-04-10"
    decision: Email and Teams before SMS
    rationale: Cost and Microsoft ecosystem
  - date: "2026-04-10"
    decision: Containerized on-prem or cloud
    rationale: IT flexibility
  - date: "2026-04-10"
    decision: Iterative fully-baked delivery
    rationale: Quality over arbitrary deadline

