version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: edt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-edt_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${DB_NAME:-equipment_downtime_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-edt_admin} -d ${DB_NAME:-equipment_downtime_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - edt-network

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: edt-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_in_production}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - edt-network

  # Create MinIO buckets on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add edt-minio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-changeme_in_production};
      /usr/bin/mc mb --ignore-existing edt-minio/floor-maps;
      /usr/bin/mc mb --ignore-existing edt-minio/equipment-photos;
      /usr/bin/mc mb --ignore-existing edt-minio/operator-attachments;
      /usr/bin/mc anonymous set download edt-minio/floor-maps;
      /usr/bin/mc anonymous set download edt-minio/equipment-photos;
      /usr/bin/mc policy set download edt-minio/floor-maps;
      exit 0;
      "
    networks:
      - edt-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  edt-network:
    driver: bridge
